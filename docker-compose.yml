version: "3.9"

services:

  backend:
    build: ./backend
    container_name: lumina_backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP}:8000
    container_name: lumina_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:3000"
    networks:
      - app

networks:
  app:
